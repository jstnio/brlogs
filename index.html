<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BRLOGS — Global freight forwarding solutions. Air, ocean, road and customs brokerage. Website launching soon." />
  <meta name="theme-color" content="#081629" />
  <title>BRLOGS — Freight Forwarding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #10153c;
      --navy2:  #1b2045;
      --accent: #E8A020;
      --white:  #F0F4FF;
      --muted:  #6B8BAD;
    }

    html {
      height: 100%;
    }

    body {
      min-height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      overflow-x: hidden;
    }

    /* ── Visually hidden (screen-reader only) ── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Grid background ── */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,160,32,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,160,32,.06) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: drift 18s linear infinite;
      pointer-events: none;
      z-index: 0;
    }
    @keyframes drift {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    /* ── Radial vignette ── */
    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 40%, transparent 0%, var(--navy) 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ── Route lines SVG ── */
    .routes {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: .18;
      z-index: 2;
    }
    .route-path {
      fill: none;
      stroke: var(--accent);
      stroke-width: 1;
      stroke-dasharray: 6 10;
      animation: dash 6s linear infinite;
    }
    .route-path:nth-child(2) { animation-delay: -2s; stroke: var(--muted); }
    .route-path:nth-child(3) { animation-delay: -4s; }
    @keyframes dash {
      to { stroke-dashoffset: -80; }
    }

    /* ── Dot markers ── */
    .dot {
      fill: var(--accent);
      animation: pulse 3s ease-in-out infinite;
    }
    .dot:nth-child(even) { animation-delay: -1.5s; fill: var(--white); }
    @keyframes pulse {
      0%, 100% { opacity: .3; r: 3; }
      50%       { opacity: 1;  r: 5; }
    }

    /* ── Layout ── */
    .stage {
      position: relative;
      z-index: 10;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem 6rem;
      gap: 0;
    }

    /* ── Logo ── */
    .logo-wrap {
      margin-bottom: 3rem;
      animation: fadeDown .9s cubic-bezier(.22,1,.36,1) both;
    }
    .logo-wrap img {
      height: 72px;
      display: block;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Divider ── */
    .divider {
      width: 48px;
      height: 2px;
      background: var(--accent);
      margin: 0 auto 2.4rem;
      animation: expand .8s .3s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes expand {
      from { width: 0; opacity: 0; }
      to   { width: 48px; opacity: 1; }
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.2rem, 9vw, 6rem);
      line-height: .92;
      letter-spacing: .02em;
      text-align: center;
      text-wrap: balance;
      color: var(--white);
      animation: fadeUp 1s .2s cubic-bezier(.22,1,.36,1) both;
    }
    .headline em {
      font-style: normal;
      color: var(--accent);
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Sub ── */
    .sub {
      margin-top: 1.6rem;
      font-size: clamp(.9rem, 2vw, 1.05rem);
      font-weight: 400;
      color: var(--muted);
      letter-spacing: .04em;
      text-align: center;
      max-width: 380px;
      line-height: 1.7;
      text-wrap: pretty;
      animation: fadeUp 1s .4s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Notify form ── */
    .notify {
      margin-top: 2.8rem;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 1s .6s cubic-bezier(.22,1,.36,1) both;
    }
    .notify input[type="email"] {
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--white);
      font-family: 'Barlow', sans-serif;
      font-size: .9rem;
      letter-spacing: .04em;
      padding: .8rem 1.2rem;
      border-radius: 2px;
      width: 260px;
      max-width: calc(100vw - 4rem);
      outline: none;
      transition: border-color .25s, background .25s;
    }
    .notify input[type="email"]::placeholder { color: var(--muted); }
    .notify input[type="email"]:focus {
      border-color: var(--accent);
      background: rgba(232,160,32,.06);
    }
    .notify button {
      background: var(--accent);
      color: var(--navy);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: .12em;
      padding: .8rem 1.8rem;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      transition: background .2s, transform .15s, box-shadow .2s;
      white-space: nowrap;
      min-height: 44px;
      min-width: 44px;
    }
    .notify button:hover {
      background: #f5b540;
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(232,160,32,.2);
    }
    .notify button:active { transform: translateY(0); box-shadow: none; }
    .notify button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    /* ── Confirm msg ── */
    .confirm {
      display: none;
      color: var(--accent);
      font-size: .85rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-top: 1rem;
      text-align: center;
    }
    .confirm.visible {
      display: block;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── Footer pills ── */
    .pills {
      margin-top: 4rem;
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 560px;
      animation: fadeUp 1s .8s cubic-bezier(.22,1,.36,1) both;
    }
    .pill {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .45rem 1rem;
      border: 1px solid rgba(107,139,173,.25);
      border-radius: 100px;
    }

    /* ── Bottom bar ── */
    .bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 20;
      animation: fadeIn 1s 1s both;
    }
    .bottom a { color: inherit; text-decoration: none; transition: color .2s; }
    .bottom a:hover { color: var(--accent); }
    .bottom a:focus-visible {
      outline: 1px solid var(--accent);
      outline-offset: 2px;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .grid-bg,
      .route-path,
      .dot { animation: none; }

      .logo-wrap,
      .divider,
      .headline,
      .sub,
      .notify,
      .pills,
      .bottom {
        animation: none;
        opacity: 1;
        transform: none;
        width: auto;
      }

      .notify button,
      .notify input[type="email"],
      .bottom a {
        transition: none;
      }
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .stage { padding: 4rem 1.5rem 5.5rem; }
      .logo-wrap img { height: 44px; }
      .notify { flex-direction: column; align-items: center; }
      .notify input[type="email"] { width: 100%; max-width: 320px; }
      .notify button { width: 100%; max-width: 320px; }
      .bottom {
        flex-direction: column;
        gap: .25rem;
        padding: .75rem 1.5rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Decorative background layers -->
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="glow" aria-hidden="true"></div>

  <!-- Animated route SVG (decorative) -->
  <svg class="routes" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice"
       xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
    <path class="route-path" d="M-40,600 Q360,100 720,300 Q1080,500 1480,200" />
    <path class="route-path" d="M-40,750 Q400,400 720,450 Q1040,500 1480,650" />
    <path class="route-path" d="M200,900 Q500,300 900,200 Q1200,120 1480,350" />
    <circle class="dot" cx="180"  cy="590" r="3" />
    <circle class="dot" cx="480"  cy="220" r="3" />
    <circle class="dot" cx="720"  cy="310" r="3" />
    <circle class="dot" cx="900"  cy="195" r="3" />
    <circle class="dot" cx="1100" cy="280" r="3" />
    <circle class="dot" cx="1300" cy="220" r="3" />
    <circle class="dot" cx="400"  cy="430" r="3" />
    <circle class="dot" cx="650"  cy="460" r="3" />
    <circle class="dot" cx="1050" cy="480" r="3" />
  </svg>

  <!-- Main content -->
  <main class="stage">
    <div class="logo-wrap">
      <img src="BRLOGS logo dark.png" alt="BRLOGS" width="360" height="72" />
    </div>

    <div class="divider" aria-hidden="true"></div>

    <h1 class="headline">Our New Website<br>Is <em>Coming Soon</em></h1>

    <p class="sub">
      Global freight forwarding solutions.<br>
      We're building something exceptional.
    </p>

    <form class="notify" id="notifyForm" novalidate>
      <label for="notifyEmail" class="sr-only">Email address for launch updates</label>
      <input
        type="email"
        id="notifyEmail"
        name="email"
        placeholder="Enter your email for updates"
        autocomplete="email"
        required
        aria-describedby="notifyConfirm"
      />
      <button type="submit">Notify Me</button>
    </form>
    <p class="confirm" id="notifyConfirm" role="status" aria-live="polite"></p>

    <nav class="pills" aria-label="Services">
      <span class="pill">Air Freight</span>
      <span class="pill">Ocean Freight</span>
      <span class="pill">Road Transport</span>
      <span class="pill">Customs Brokerage</span>
      <span class="pill">Warehousing</span>
    </nav>
  </main>

  <!-- Bottom bar -->
  <footer class="bottom">
    <span>&copy; 2026 BRLOGS</span>
    <a href="mailto:shipping@brlogs.com">shipping@brlogs.com</a>
  </footer>

  <script>
    document.getElementById('notifyForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('notifyEmail');
      if (!email.validity.valid) {
        email.focus();
        return;
      }
      this.style.display = 'none';
      const msg = document.getElementById('notifyConfirm');
      msg.textContent = "You’re on the list — we’ll be in touch.";
      msg.classList.add('visible');
    });
  </script>
</body>
</html>
